name: Deploy Adr Agent

# Required GitHub Actions repository variables (Settings → Secrets and
# variables → Actions → Variables). See agents/adr/project_config.py.
#   TARGET_REPO   <owner>/<repo> the agent should act on
#                   (baked into the runtime as env var GITHUB_REPO — see
#                   deploy-workitems.yml for why the variable name itself
#                   can't start with GITHUB_)

on:
  push:
    branches: [main]
    paths:
      - "agents/adr/**"
      - "agents/shared/**"

permissions:
  contents: read
  id-token: write    # required so the reusable callee (deploy-agent.yml) can assume the OIDC deploy role

jobs:
  deploy:
    uses: ./.github/workflows/deploy-agent.yml
    with:
      agent_name: adr
      env_vars: "GITHUB_REPO=${{ vars.TARGET_REPO }}"
    secrets: inherit

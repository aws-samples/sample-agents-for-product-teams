name: Deploy Workitems Agent

# Required GitHub Actions repository variables (Settings → Secrets and
# variables → Actions → Variables). These are baked into the AgentCore
# Runtime as environment variables — see agents/workitems/project_config.py
# for what each one means.
#   GITHUB_REPO             <owner>/<repo> the agent should act on
#   ASANA_PROJECT_GID       Asana project the agent reads from
#   ASANA_WORKSPACE_GID     Asana workspace containing that project
#
# Optional: ASANA_PROJECT_NAME — cosmetic label used in system prompts. If you
# want it, extend the env_vars line below to include
# `ASANA_PROJECT_NAME=${{ vars.ASANA_PROJECT_NAME }}` — but only if the
# variable is actually set, since the workflow rejects empty values.

on:
  push:
    branches: [main]
    paths:
      - "agents/workitems/**"
      - "agents/shared/**"

permissions:
  contents: read

jobs:
  deploy:
    uses: ./.github/workflows/deploy-agent.yml
    with:
      agent_name: workitems
      env_vars: "GITHUB_REPO=${{ vars.GITHUB_REPO }},ASANA_PROJECT_GID=${{ vars.ASANA_PROJECT_GID }},ASANA_WORKSPACE_GID=${{ vars.ASANA_WORKSPACE_GID }}"
    secrets: inherit
